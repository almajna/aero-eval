line-length = 100
target-version = "py310"

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific
    "N",      # pep8-naming
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # function calls in defaults (common in PyTorch)
    "N806",   # var name should be lowercase (we use Q, K, V for tensors)
    "N803",   # arg name should be lowercase (same reason)
]

[lint.per-file-ignores]
"tests/**/*.py" = ["B", "SIM"]
"studies/**/*.py" = ["B", "SIM", "N"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
