name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new pushes to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff format --check
        run: ruff format --check .
      - name: ruff check
        run: ruff check .

  test:
    name: Test (py${{ matrix.python }} / torch${{ matrix.torch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11"]
        torch: ["2.4", "2.6"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install PyTorch ${{ matrix.torch }} (CPU)
        run: |
          pip install --upgrade pip
          pip install "torch~=${{ matrix.torch }}.0" --index-url https://download.pytorch.org/whl/cpu

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest -v --cov=aero_eval --cov-report=term-missing -m "not slow and not gpu"

  fpr:
    name: False-Positive Regression suite
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install PyTorch (CPU)
        run: |
          pip install --upgrade pip
          pip install "torch~=2.6.0" --index-url https://download.pytorch.org/whl/cpu
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Run FPR suite
        run: |
          if [ -d tests/fpr ] && [ -n "$(ls -A tests/fpr 2>/dev/null)" ]; then
            pytest -v tests/fpr -m fpr
          else
            echo "tests/fpr/ not yet populated — skipping (will be added in Pass 4)"
          fi
